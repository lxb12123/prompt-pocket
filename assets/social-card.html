<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", "PingFang SC", Arial, sans-serif;
    background: linear-gradient(135deg, #FDF5EC 0%, #FBE7D3 55%, #F7DCC4 100%);
    overflow: hidden;
    position: relative;
  }
  .blob { position: absolute; border-radius: 50%; }
  .b1 { width: 520px; height: 520px; left: -120px; top: -160px; background: #F6E0CA; opacity: .55; }
  .b2 { width: 280px; height: 280px; right: -70px; bottom: -90px; background: #F2D2B0; opacity: .5; }
  .dot { position: absolute; border-radius: 50%; background: #E8A77E; opacity: .65; }

  .wrap { position: absolute; inset: 0; display: flex; align-items: center; padding: 0 70px; }
  .art { width: 470px; flex: 0 0 470px; display: flex; align-items: center; justify-content: center; }
  .art svg { width: 470px; height: auto; filter: drop-shadow(0 16px 26px rgba(193,95,60,.20)); }

  .copy { flex: 1; padding-left: 26px; }
  .kicker { display: flex; gap: 9px; margin-bottom: 20px; flex-wrap: wrap; max-width: 600px; }
  .chip {
    font-size: 17px; font-weight: 600; color: #B05B36;
    background: #FBEADB; border: 1px solid #EFCDAE;
    padding: 5px 13px; border-radius: 999px;
  }
  .chip.more { color: #C08A6A; background: transparent; border-style: dashed; }
  h1 {
    font-size: 88px; line-height: .98; font-weight: 800;
    color: #3A2418; letter-spacing: -2px; margin-bottom: 20px;
  }
  .tag { font-size: 35px; font-weight: 800; color: #D2744A; line-height: 1.18; margin-bottom: 16px; }
  .sub { font-size: 26px; font-weight: 500; color: #6E5544; line-height: 1.4; max-width: 600px; }
  .sub code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: #fff; color: #D2744A; font-weight: 700;
    padding: 2px 10px; border-radius: 8px; border: 1px solid #EBCBAE;
    font-size: 24px;
  }
  .foot { position: absolute; right: 70px; bottom: 40px; font-size: 20px; font-weight: 600; color: #B98A6B; }
</style>
</head>

    <div class="copy">

        <span class="chip">Claude Code</span>

        <span class="chip">OpenCode</span>
        <span class="chip">Cursor</span>
        <span class="chip">Copilot</span>

      </div>
      <h1>Prompt&nbsp;Pocket</h1>
      <div class="tag">Stop re&#8209;typing the same prompt.</div>
      <div class="sub">Save it once, then run it from the <code>/</code> dropdown — in every session, across every agent.</div>
    </div>
  </div>
  <div class="foot">github.com/lxb12123/prompt-pocket</div>
</body>
</html>
