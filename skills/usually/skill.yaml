name: usually
description: 提示词口袋——记住你最常用的提示词,用原生菜单上下键选中后直接代为执行;支持 add/delete/edit/find 子动作,并自动扫描会话把重复 ≥7 次的提示词收录。
when-to-use: 当用户想列出/复用自己的高频提示词(说 /usually、"我平时常说啥"、"列一下常用的"),或要 add 记一句、delete 删一句、edit 改一句、find 查一句时使用。
argument-hint: "[add|delete|edit|find] <文本>(留空=列出并选中执行)"
# 自描述原语(基因⑤):声明这个技能用到的能力
uses:
  mcp: []
  permissions: []        # 留空=不限制工具:选中即执行那条提示词可能需要任意工具
  subagents: []
