name: usually
description: Prompt Pocket — remembers your most-used prompts and lets you pick one to run instantly. Auto-records prompts you repeat >= 7 times across agent sessions, plus manual add/delete/edit/find. Pick-to-run and manual management work on every host; auto-scan covers Claude Code, Codex and OpenCode sessions.
when-to-use: Use when the user wants to list or reuse their frequent prompts (e.g. "/usually", "list my usual prompts", "what do I usually say", or in Chinese "列一下我常用的" / "我平时常说啥"), or to add / delete / edit / find a saved prompt.
argument-hint: "[add|delete|edit|find] <text>  (empty = list and pick one to run)"
# Self-describing primitives (gene #5): declare the capabilities this skill uses
uses:
  mcp: []
  permissions: []        # empty = no tool restriction: the picked prompt may need any tool to execute
  subagents: []
